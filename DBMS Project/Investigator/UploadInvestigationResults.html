<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Test Report</title>

<style>
    body{ font-family: Arial, sans-serif; background-color:#f2f6f8; margin:0; padding:0; text-align:center; }
    header{ background-color:#d6ecff; padding:20px; }
    header h1{ margin:0; }
    header h3{ margin:5px 0; color:#555; }
.logout {
    position: absolute; 
    right: 20px;     
    top: 20px; 
    width: auto;      
    padding: 8px 20px;  
    background-color: #ff4d4d;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    text-decoration: none; 
    font-size: 14px;
    white-space: nowrap;
}
        .logout:hover { background-color: #cc0000; }

    .form-container{
        width:40%;
        margin:40px auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0px 2px 5px rgba(0,0,0,0.1);
        text-align:left;
    }

    label{ font-weight:bold; display: block; margin-top: 15px; }
    
    input, select, textarea{
        width:100%;
        padding:10px;
        margin-top:5px;
        border:1px solid #ccc;
        border-radius:5px;
        box-sizing: border-box; /* Ensures padding doesn't affect width */
    }

    /* Style for read-only ID field */
    input[readonly] { background-color: #eee; cursor: not-allowed; }

    button{
        background-color:#4CAF50;
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:5px;
        cursor:pointer;
        width:100%;
        font-size:16px;
        margin-top: 20px;
    }

    button:hover{ background-color:#45a049; }
    footer{ background:#e8eef2; padding:15px; margin-top:40px; font-size:14px; color:#444; }
</style>
</head>

<body>

<header>
    <h1>Smart Healthcare Management System</h1>
    <h3>Upload Investigation Result</h3>
    <button class="logout" onclick="window.location.href='../SystemAccess.php'">Logout</button>
</header>

<div class="form-container">
    <h2>Update Record</h2>

    <form action="update_logic.php" method="POST" enctype="multipart/form-data">

        <label>Medical Test ID</label>
        <input type="text" name="test_ID" value="1005" readonly>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <label>Result Status</label>
        <select name="Result_Status">
            <option value="Pending">Pending</option>
            <option value="Completed" selected>Completed</option>
            <option value="In Review">In Review</option>
        </select>

        <label>Upload Report File (Binary/Blob)</label>
        <input type="file" name="Report_File_Path" required>

        <label>Result Details</label>
        <textarea name="Result_Details" rows="5" placeholder="Enter findings, measurements, or observations..."></textarea>

        <button type="submit">Update Investigation</button>

    </form>
</div>

<footer>
    Smart Healthcare Management System © 2026
</footer>

</body>
</html>
