<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log Symptoms</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f2f6f8;
    margin:0;
    padding:0;
    text-align:center;
}

/* Header */

header{
    background-color:#d6ecff;
    padding:20px;
}

header h1{
    margin:0;
}

header h3{
    margin:5px 0;
    color:#555;
}

/* Form Container */

.form-container{
    width:420px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 2px 5px rgba(0,0,0,0.1);
    text-align:left;
}

label{
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* Button */

button{
    width:100%;
    padding:10px;
    border:none;
    background-color:#4da6ff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background-color:#3399ff;
}

/* Footer */

footer{
    background:#e8eef2;
    padding:15px;
    margin-top:40px;
    font-size:14px;
    color:#444;
}

</style>
</head>

<body>

<header>
<h1>Smart Healthcare Management System</h1>
<h3>Log Symptoms</h3>
</header>

<div class="form-container">

<form>

<label>Patient ID</label>
<input type="text" placeholder="Enter your ID">

<label>Date</label>
<input type="date">

<label>Select Symptom</label>
<select>
<option>Fever</option>
<option>Cough</option>
<option>Headache</option>
<option>Fatigue</option>
<option>Other</option>
</select>

<label>Severity</label>
<select>
<option>Mild</option>
<option>Moderate</option>
<option>Severe</option>
</select>

<label>Additional Notes</label>
<textarea rows="3" placeholder="Describe your symptoms"></textarea>

<button type="submit">Submit Symptoms</button>

</form>

</div>

<footer>
Smart Healthcare Management System © 2026
</footer>

</body>
</html>
