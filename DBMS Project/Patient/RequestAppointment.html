<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Appointment</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f2f6f8;
    margin:0;
    padding:0;
    text-align:center;
}

/* Header */

header{
    background-color:#d6ecff;
    padding:20px;
}

header h1{
    margin:0;
}

header h3{
    margin:5px 0;
    color:#555;
}

/* Form Box */

.form-container{
    width:400px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 2px 5px rgba(0,0,0,0.1);
    text-align:left;
}

label{
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* Button */

button{
    width:100%;
    padding:10px;
    border:none;
    background-color:#4da6ff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background-color:#3399ff;
}

/* Footer */

footer{
    background:#e8eef2;
    padding:15px;
    margin-top:40px;
    font-size:14px;
    color:#444;
}

</style>
</head>

<body>

<header>
<h1>Smart Healthcare Management System</h1>
<h3>Request Appointment</h3>
</header>

<div class="form-container">

<form>

<label>Patient Name</label>
<input type="text" placeholder="Enter your name">

<label>Select Doctor</label>
<select>
<option>Dr. Ahmed (Cardiologist)</option>
<option>Dr. Rahman (Dermatologist)</option>
<option>Dr. Khan (General Physician)</option>
</select>

<label>Appointment Date</label>
<input type="date">

<label>Preferred Time</label>
<input type="time">

<label>Reason for Visit</label>
<textarea rows="3" placeholder="Describe your problem"></textarea>

<button type="submit">Submit Appointment Request</button>

</form>

</div>

<footer>
Smart Healthcare Management System © 2026
</footer>

</body>
</html>
