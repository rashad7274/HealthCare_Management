<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Appointment</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f6f8;
    margin: 0;
    padding: 0;
    text-align: center;
}

header {
    background-color: #d6ecff;
    padding: 20px;
}
header h1 { margin: 0; }
header h3 { margin: 5px 0; color: #555; }
.logout {
            position: absolute; 
            right: 20px;     
            top: 50%;       
            transform: translateY(-50%);
            width: auto;      
            padding: 8px 20px;  
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none; 
            font-size: 14px;
            white-space: nowrap;
        }
        .logout:hover { background-color: #cc0000; }

.form-container {
    width: 400px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
    text-align: left;
}

label { font-weight: bold; display: block; margin-top: 10px; }

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box; 
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    background-color: #4da6ff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    margin-top: 10px;
}
button:hover { background-color: #3399ff; }

/* Alerts */
.alert { padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; text-align: center; }
.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

footer {
    background: #e8eef2;
    padding: 15px;
    margin-top: 40px;
    font-size: 14px;
    color: #444;
}
</style>
</head>

<body>

<header>
    <h1>Smart Healthcare Management System</h1>
    <h3>Request Appointment</h3>
    <button class="logout" onclick="window.location.href='../SystemAccess.php'">Logout</button>
</header>

<div class="form-container">

    <form action="" method="POST">

        <input type="hidden" name="status" value="Pending">
        <input type="hidden" name="Manager_ID" value="">

        <label>Select Doctor</label>
        <select name="Doctor_ID" required>
            <option value="">-- Choose a Doctor --</option>
            <option value="2001">Dr. Ahmed (Cardiologist)</option>
            <option value="2002">Dr. Rahman (Dermatologist)</option>
            <option value="2003">Dr. Khan (General Physician)</option>
        </select>

        <label>Appointment Date</label>
        <input type="date" name="date" required min="2026-04-11">

        <label>Preferred Time</label>
        <input type="time" name="time">

        <label>Reason for Visit</label>
        <textarea name="reason" rows="3" placeholder="Describe your problem..."></textarea>

        <button type="submit">Submit Appointment Request</button>

    </form>

</div>

<footer>
    Smart Healthcare Management System © 2026
</footer>

</body>
</html>
