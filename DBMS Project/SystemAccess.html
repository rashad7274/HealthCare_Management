<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Access</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f2f6f8;
    margin:0;
    padding:0;
    text-align:center;
}

header{
    background-color:#d6ecff;
    padding:20px;
}

header h1{
    margin:0;
}

header h3{
    margin:5px 0;
    color:#555;
}

.login-container{
    width:350px;
    margin:80px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 2px 5px rgba(0,0,0,0.1);
    text-align:left;
}

/* NEW: small improvement */
.login-container h3{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* NEW: focus effect */
input:focus, select:focus{
    border-color:#4da6ff;
    outline:none;
}

/* Button */
button{
    width:100%;
    padding:10px;
    border:none;
    background-color:#4da6ff;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background-color:#3399ff;
}

/* NEW: extra links */
.extra-links{
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

.extra-links a{
    text-decoration:none;
    color:#4da6ff;
}

.extra-links a:hover{
    text-decoration:underline;
}

footer{
    background:#e8eef2;
    padding:15px;
    margin-top:60px;
    font-size:14px;
    color:#444;
}

</style>
</head>

<body>

<header>
<h1>Smart Healthcare Management System</h1>
<h3>System Access (Login)</h3>
</header>

<div class="login-container">

<h3>User Login</h3>

<form onsubmit="redirectUser(event)">

<label>Username</label>
<input type="text" placeholder="Enter username" required>

<label>Password</label>
<input type="password" placeholder="Enter password" required>

<label>Select Role</label>
<select required>
<option value="">-- Select Role --</option>
<option>Accountant</option>
<option>Doctor</option>
<option>Patient</option>
<option>Investigator</option>
<option>Insurance</option>
<option>Appointment Manager</option>
</select>

<button type="submit">Login</button>

</form>

<div class="extra-links">
<p><a href="#">Forgot Password?</a></p>
</div>

</div>

<footer>
Smart Healthcare Management System © 2026
</footer>

<script>
function redirectUser(event){
    event.preventDefault();

    let role = document.querySelector("select").value;

    if(role === "Doctor"){
    window.location.href = "Doctor/Doctor.html";
    }
    else if(role === "Patient"){
        window.location.href = "Patient/Patient.html";
    }
    else if(role === "Investigator"){
        window.location.href = "Investigator/Investigator.html";
    }
    else if(role === "Insurance"){
        window.location.href = "Insurance/Insurance.html";
    }
    else if(role === "Accountant"){
        window.location.href = "Accountant/Accountant.html";
    }
    else if(role === "Appointment Manager"){
        window.location.href = "Appointment/Appointment.html";
    }
    else{
        alert("Please select a role");
    }
}
</script>

</body>
</html>
