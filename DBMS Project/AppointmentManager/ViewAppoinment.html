<!DOCTYPE html>
<html>
<head>
    <title>View Appointments</title>
    <style>
        body { font-family: Arial; background: #f4f6f8; }
        h2 { text-align: center; }
        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: #eaeaea;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }
        th { background: #a9c0d3; }
        footer {
            text-align: center;
            padding: 15px;
            background: #d0d6db;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<h2>View Appointments</h2>

<table>
    <tr>
        <th>Patient Name</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Time</th>
        <th>Status</th>
    </tr>
    <tr>
        <td>John Doe</td>
        <td>Dr. Smith</td>
        <td>20 Mar 2026</td>
        <td>10:00 AM</td>
        <td>Confirmed</td>
    </tr>
    <tr>
        <td>Jane Ali</td>
        <td>Dr. Rahman</td>
        <td>21 Mar 2026</td>
        <td>12:30 PM</td>
        <td>Pending</td>
    </tr>
</table>
<footer>
    Smart Healthcare Management System © 2026
</footer>
</body>
</html>
