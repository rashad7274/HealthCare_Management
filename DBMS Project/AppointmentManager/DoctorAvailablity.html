<!DOCTYPE html>
<html>
<head>
    <title>Doctor Availability</title>
    <style>
        body { font-family: Arial; background: #f4f6f8; }
        .form-box {
            width: 400px;
            margin: auto;
            background: #eaeaea;
            padding: 20px;
            border-radius: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            background: #a9c0d3;
            border: none;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 15px;
            background: #d0d6db;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Doctor Availability</h2>

<div class="form-box">
    <label>Select Doctor</label>
    <select>
        <option>Dr. Smith</option>
        <option>Dr. Rahman</option>
    </select>

    <label>Available Date</label>
    <input type="date">

    <label>Available Time Slot</label>
    <input type="time">

    <button>Set Availability</button>
</div>
<footer>
    Smart Healthcare Management System © 2026
</footer>
</body>
</html>
