<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Access</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f2f6f8;
    margin:0;
    padding:0;
    text-align:center;
}

header{
    background-color:#d6ecff;
    padding:20px;
}

header h1{
    margin:0;
}

header h3{
    margin:5px 0;
    color:#555;
}

.login-container{
    width:350px;
    margin:80px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 2px 5px rgba(0,0,0,0.1);
    text-align:left;
}

label{
    font-weight:bold;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background-color:#4da6ff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background-color:#3399ff;
}

footer{
    background:#e8eef2;
    padding:15px;
    margin-top:60px;
    font-size:14px;
    color:#444;
}

</style>
</head>

<body>

<header>
<h1>Smart Healthcare Management System</h1>
<h3>System Access (Login)</h3>
</header>

<!-- Login Form -->
<div class="login-container">

<h3>User Login</h3>

<form>

<label>Username</label>
<input type="text" placeholder="Enter username">

<label>Password</label>
<input type="password" placeholder="Enter password">

<label>Select Role</label>
<select>
<option>Accountant</option>
<option>Doctor</option>
<option>Patient</option>
<option>Investigator</option>
<option>Insurance</option>
<option>Appointment Manager</option>
</select>

<button type="submit">Login</button>

</form>

</div>

<footer>
Smart Healthcare Management System © 2026
</footer>

</body>
</html>
