<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice Generation</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f2f6f8;
    margin:0;
    padding:0;
    text-align:center;
}

header{
    background-color:#d6ecff;
    padding:20px;
    position:relative;
}

header h1{
    margin:0;
}

header h3{
    margin:5px 0;
    color:#555;
}

.logout{
    position:absolute;
    right:20px;
    top:20px;
    width:auto;
    padding:8px 15px;
    border:none;
    background-color:#ff6b6b;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.form-container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 2px 5px rgba(0,0,0,0.1);
    text-align:left;
}

label{
    font-weight:bold;
}

/* UPDATED: Added 'select' here so the dropdown matches the inputs exactly */
input, select {
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
    box-sizing: border-box; /* Prevents width from overflowing */
}

button{
    width:100%;
    padding:10px;
    border:none;
    background-color:#4da6ff;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin-top: 10px;
}

button:hover{
    background-color:#3399ff;
}

footer{
    background:#e8eef2;
    padding:15px;
    margin-top:60px;
    font-size:14px;
    color:#444;
}

</style>
</head>

<body>

<header>
    <h1>Smart Healthcare Management System</h1>
    <h3>Invoice Generation</h3>
    <button class="logout" onclick="window.location.href='../SystemAccess.html'">Logout</button>
</header>

<div class="form-container">
    <h3>Generate New Invoice</h3>

    <form action="process_invoice.php" method="POST">

        <label for="patient_id">Patient ID</label>
        <input type="text" name="patient_id" id="patient_id" placeholder="Enter patient ID" required>

        <label for="service_desc">Service Description</label>
        <input type="text" name="service_desc" id="service_desc" placeholder="Enter service" required>

        <label for="total_amount">Total Amount</label>
        <input type="number" name="total_amount" id="total_amount" placeholder="Enter amount" required>

        <label for="invoice_date">Date</label>
        <input type="date" name="invoice_date" id="invoice_date" required>

        <label for="payment_status">Payment Status</label>
        <select name="payment_status" id="payment_status" required>
            <option value="Due">Due</option>
            <option value="Paid">Paid</option>
        </select>

        <button type="submit" name="generate_bill">Generate Bill</button>

    </form>
</div>

<footer>
    Smart Healthcare Management System © 2026
</footer>

</body>
</html>
