<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Overview</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f2f6f8;
    margin:0;
    padding:0;
    text-align:center;
}

header{
    background-color:#d6ecff;
    padding:20px;
    position:relative;
}

header h1{
    margin:0;
}

header h3{
    margin:5px 0;
    color:#555;
}

.logout{
    position:absolute;
    right:20px;
    top:20px;
    width:auto;
    padding:8px 15px;
    border:none;
    background-color:#ff6b6b;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:50px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:220px;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 2px 5px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    font-size:20px;
    font-weight:bold;
    color:#333;
}

footer{
    background:#e8eef2;
    padding:15px;
    margin-top:60px;
    font-size:14px;
    color:#444;
}

</style>
</head>

<body>

<header>
<h1>Smart Healthcare Management System</h1>
<h3>Financial Overview</h3>
<button class="logout" onclick="window.location.href='../SystemAccess.html'">Logout</button>
</header>

<!-- Financial Overview Section -->
<section class="cards">

<div class="card">
<h3>Total Revenue</h3>
<p>$25,000</p>
</div>

<div class="card">
<h3>Pending Invoices</h3>
<p>12</p>
</div>

<div class="card">
<h3>Today's Payments</h3>
<p>$3,200</p>
</div>

</section>

<footer>
Smart Healthcare Management System © 2026
</footer>

</body>
</html>
