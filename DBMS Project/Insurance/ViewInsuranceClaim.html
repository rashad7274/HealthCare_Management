<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insurance Claims Management</title>

<style>
    body{ font-family: Arial, sans-serif; background-color:#f2f6f8; margin:0; padding:0; text-align:center; }
    header{ background-color:#d6ecff; padding:20px; }
    header h1{ margin:0; }
    header h3{ margin:5px 0; color:#555; }

    .container{
        width:80%; 
        margin:40px auto;
        background:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0px 2px 5px rgba(0,0,0,0.1);
    }

    table{ width:100%; border-collapse:collapse; margin-top:20px; }
    th, td{ border:1px solid #ddd; padding:12px; text-align: center; }
    th{ background-color:#eef7ff; color: #333; }
    tr:hover{ background-color:#f5f5f5; }

    .status-approved { color: green; font-weight: bold; }
    .status-pending { color: orange; font-weight: bold; }
    .status-rejected { color: red; font-weight: bold; }

    footer{ background:#e8eef2; padding:15px; margin-top:40px; font-size:14px; color:#444; }
</style>
</head>

<body>

<header>
    <h1>Smart Healthcare Management System</h1>
    <h3>Insurance Department</h3>
</header>

<div class="container">
    <h2>Submitted Insurance Claims</h2>

    <table>
        <thead>
            <tr>
                <th>Claim ID</th>
                <th>Invoice ID</th>
                <th>Patient ID</th>
                <th>Patient Name</th> <th>Claim Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>7001</td>
                <td>INV-900</td>
                <td>P-101</td>
                <td>John Smith</td>
                <td>$2,000.00</td>
                <td><span class="status-pending">Pending</span></td>
            </tr>
            <tr>
                <td>7002</td>
                <td>INV-915</td>
                <td>P-102</td>
                <td>Sarah Ahmed</td>
                <td>$350.00</td>
                <td><span class="status-approved">Approved</span></td>
            </tr>
            <tr>
                <td>7003</td>
                <td>INV-920</td>
                <td>P-104</td>
                <td>Fatima Khan</td>
                <td>$150.00</td>
                <td><span class="status-rejected">Rejected</span></td>
            </tr>
        </tbody>
    </table>
</div>

<footer>
