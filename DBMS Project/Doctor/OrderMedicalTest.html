<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Medical Tests</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f6f8;
    margin: 0;
    padding: 0;
    text-align: center;
}

/* Header */
header {
    background-color: #d6ecff;
    padding: 20px;
}

header h1 { margin: 0; }
header h3 { margin: 5px 0; color: #555; }

.logout {
            position: absolute; 
            right: 20px;     
            top: 50%;       
            transform: translateY(-50%);
            width: auto;      
            padding: 8px 20px;  
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none; 
            font-size: 14px;
            white-space: nowrap;
        }
        .logout:hover { background-color: #cc0000; }

/* Form Container */
.form-container {
    width: 420px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
    text-align: left;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box; /* Prevents overflow */
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    border: none;
    background-color: #4da6ff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    margin-top: 10px;
}

button:hover {
    background-color: #3399ff;
}

/* Footer */
footer {
    background: #e8eef2;
    padding: 15px;
    margin-top: 40px;
    font-size: 14px;
    color: #444;
}
</style>
</head>

<body>

<header>
    <h1>Smart Healthcare Management System</h1>
    <h3>Order Medical Tests</h3>
    <button class="logout" onclick="window.location.href='../SystemAccess.php'">Logout</button>
</header>

<div class="form-container">

    <form action="" method="POST">

        <label>Patient ID</label>
        <input type="number" name="Patient_ID" placeholder="Enter patient ID" required>

        <label>Select Test</label>
        <select name="test_name" required>
            <option value="">-- Choose Test --</option>
            <option value="Blood Test">Blood Test</option>
            <option value="X-Ray">X-Ray</option>
            <option value="MRI Scan">MRI Scan</option>
            <option value="CT Scan">CT Scan</option>
            <option value="Urine Test">Urine Test</option>
        </select>

        <label>Priority Level</label>
        <select name="priority" required>
            <option value="Normal">Normal</option>
            <option value="Urgent">Urgent</option>
            <option value="Emergency">Emergency</option>
        </select>

        <label>Additional Notes</label>
        <textarea name="additional_notes" rows="3" placeholder="Enter instructions for the lab..."></textarea>

        <button type="submit">Submit Test Request</button>

    </form>

</div>

<footer>
    Smart Healthcare Management System © 2026
</footer>

</body>
</html>
